name: Release nonotify-opencode

on:
  push:
    branches: [main]
    paths:
      - "nonotify-opencode/**"
      - ".github/workflows/release-plugin.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nonotify-opencode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Decide whether to release
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          NAME="$(node -p "require('./package.json').name")"
          TAG="${NAME}@${VERSION}"

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS="true"
          else
            TAG_EXISTS="false"
          fi

          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            NPM_EXISTS="true"
          else
            NPM_EXISTS="false"
          fi

          SHOULD_RELEASE="true"
          REASON="ok"

          if [[ "$TAG_EXISTS" == "true" ]]; then
            SHOULD_RELEASE="false"
            REASON="git tag already exists"
          elif [[ "$NPM_EXISTS" == "true" ]]; then
            SHOULD_RELEASE="false"
            REASON="version already published on npm"
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "npm_exists=$NPM_EXISTS" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Decision: should_release=$SHOULD_RELEASE ($REASON)"

      - name: Stop summary
        if: steps.guard.outputs.should_release != 'true'
        run: |
          echo "Skipping release: ${{ steps.guard.outputs.reason }}"
          echo "Package: ${{ steps.guard.outputs.name }}"
          echo "Version: ${{ steps.guard.outputs.version }}"

      - name: Install dependencies
        if: steps.guard.outputs.should_release == 'true'
        run: npm install

      - name: Run tests
        if: steps.guard.outputs.should_release == 'true'
        run: npm test

      - name: Create git tag
        if: steps.guard.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ steps.guard.outputs.tag }}"
          git push origin "${{ steps.guard.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.guard.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.guard.outputs.tag }}
          name: Release ${{ steps.guard.outputs.name }}@${{ steps.guard.outputs.version }}
          generate_release_notes: true

      - name: Publish to npm
        if: steps.guard.outputs.should_release == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
